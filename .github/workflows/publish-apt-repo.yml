name: publish-apt-repo

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-apt-repo
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout gh-pages (or seed empty orphan)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi
          # Ensure reprepro config exists (idempotent).
          # Written with printf (not a heredoc) so the lines can be indented
          # to keep the YAML block scalar valid while the generated file has
          # no leading whitespace (Debian control format treats leading
          # whitespace as a field continuation).
          mkdir -p conf
          printf '%s\n' \
            "Origin: pistomp" \
            "Label: pistomp" \
            "Suite: trixie" \
            "Codename: trixie" \
            "Architectures: arm64" \
            "Components: main" \
            "Description: pi-Stomp custom packages" \
            > conf/distributions
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add conf/distributions
          git commit -m "apt: bootstrap reprepro config" || true

      - name: Install reprepro
        run: sudo apt-get update -qq && sudo apt-get install -y -qq reprepro

      - name: Download all *_arm64.deb release assets
        working-directory: repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p incoming
          # REST API returns full release objects with .assets[].browser_download_url.
          # Paginate to cover all releases (100 per page is the max).
          PAGE=1
          while :; do
            URLS=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100&page=${PAGE}" \
              | jq -r '.[].assets[].browser_download_url' 2>/dev/null \
              | grep '_arm64\.deb$' || true)
            if [ -z "$URLS" ]; then
              break
            fi
            echo "$URLS" | xargs -r -n1 -I{} wget -q -P incoming/ {}
            PAGE=$((PAGE + 1))
          done

      - name: Add packages to repo (refuses duplicate name+version)
        working-directory: repo
        run: |
          shopt -s nullglob
          for deb in incoming/*.deb; do
            reprepro -b . includedeb trixie "$deb" || {
              echo "::warning::reprepro refused $deb (duplicate name+version, or missing Section/Priority in debian/control)."
            }
          done

      - name: Commit and push
        working-directory: repo
        run: |
          git add -A pool/ dists/ conf/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes — repo is already up to date."
            exit 0
          fi
          git commit -m "apt: rebuild index $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages