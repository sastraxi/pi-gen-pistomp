# Reusable build workflow — called by .github/workflows/build-<pkg>.yml
#
# Usage in a per-package workflow:
#
#   name: build-jack2-pistomp
#   on:
#     push:
#       branches: [main]
#       paths: ['debpkgs/jack2-pistomp/**', 'config.sh']
#     pull_request:
#       paths: ['debpkgs/jack2-pistomp/**', 'config.sh']
#     workflow_dispatch:
#   jobs:
#     build:
#       uses: ./.github/workflows/build-deb.yml
#       with:
#         pkg: jack2-pistomp
#       secrets: inherit

name: build-deb

on:
  workflow_call:
    inputs:
      pkg:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install base tools
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            ca-certificates curl wget jq gnupg dpkg-dev devscripts debhelper-compat \
            build-essential python3-dev git swig
          # uv — used by debian/rules to build the pistomp-recovery venv.
          # Matches the image build's uv install (stage2/05-pistomp/05-run.sh).
          curl -LsSf https://astral.sh/uv/install.sh \
            | env UV_INSTALL_DIR=/usr/local/bin INSTALLER_NO_MODIFY_PATH=1 sh

      - name: Extract version
        id: version
        run: |
          source config.sh
          PKG="${{ inputs.pkg }}"
          # Try changelog first (dpkg-buildpackage packages), then config.sh pins
          if [ -f "debpkgs/${PKG}/debian/changelog" ]; then
            VERSION=$(dpkg-parsechangelog --show-field Version \
              --file "debpkgs/${PKG}/debian/changelog")
          else
            # Binary-only packages: version is in debian/control
            VERSION=$(grep '^Version:' "debpkgs/${PKG}/debian/control" | awk '{print $2}')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check version not already published (PR only)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/debpkg/${{ inputs.pkg }}/${{ steps.version.outputs.version }}")
          if [ "$STATUS" = "200" ]; then
            echo "ERROR: version ${{ steps.version.outputs.version }} is already published." >&2
            echo "Bump the version in debpkgs/${{ inputs.pkg }}/debian/changelog" >&2
            echo "(or config.sh for pinned packages)." >&2
            exit 1
          fi
          echo "Version ${{ steps.version.outputs.version }} is new, OK."

      - name: Install build dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG="${{ inputs.pkg }}"
          CONTROL="debpkgs/${PKG}/debian/control"
          if [ ! -f "$CONTROL" ]; then
            echo "No debian/control (binary-only package), skipping build-deps"
            exit 0
          fi
          mkdir -p "$GITHUB_WORKSPACE/cache"

          # Extract package names from dpkg-checkbuilddeps stderr, stripping
          # version constraints like (>= 1.0) and the | alternatives operator.
          # For binary-only packages (no Source: stanza), dpkg-checkbuilddeps
          # silently exits 0, so fall back to parsing Build-Depends directly.
          get_unmet() {
            if ! grep -q '^Source:' "$CONTROL"; then
              { grep '^Build-Depends:' "$CONTROL" || true; } \
                | sed 's/Build-Depends://' | tr ',' '\n' \
                | sed 's/([^)]*)//g; s/|.*//; s/ //g' \
                | { grep -E '^[a-z]' || true; } \
                | while read -r dep; do
                    dpkg -s "$dep" &>/dev/null || echo "$dep"
                  done
              return
            fi
            local raw
            raw=$(dpkg-checkbuilddeps "$CONTROL" 2>&1 || true)
            echo "$raw" | grep -i 'unmet build dependencies' | \
              sed 's/.*unmet build dependencies: //i' | \
              tr ' ' '\n' | \
              grep -E '^[a-z]' || true
          }

          for PASS in 1 2 3 4 5; do
            UNMET=$(get_unmet)
            [ -z "$UNMET" ] && { echo "All build dependencies satisfied."; break; }
            [ "$PASS" -eq 5 ] && {
              echo "ERROR: build deps still unmet after 4 passes: $UNMET" >&2
              exit 1
            }

            echo "=== Pass $PASS — unmet: $(echo $UNMET | tr '\n' ' ')"
            for DEP in $UNMET; do
              # Try apt first; if the package isn't in any apt source it exits non-zero.
              if apt-get install -y -qq "$DEP" >/dev/null 2>&1; then
                echo "$DEP: installed from apt"
                continue
              fi

              # Fall back to a published GitHub Release for this repo.
              echo "$DEP: not in apt, trying GitHub Releases..."
              ASSET_URL=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
                "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" \
                | jq -r --arg p "$DEP" \
                  '.[] | select(.tag_name | startswith("debpkg/" + $p + "/")) | .assets[].browser_download_url' \
                | grep "/${DEP}_.*_arm64\.deb$" | head -1)

              if [ -z "$ASSET_URL" ]; then
                echo "ERROR: $DEP not found in apt or GitHub Releases." >&2
                exit 1
              fi

              wget -q -P "$GITHUB_WORKSPACE/cache" "$ASSET_URL"
              dpkg -i "$GITHUB_WORKSPACE/cache/${DEP}_"*"_arm64.deb" || true
              apt-get install -f -y -qq
              echo "$DEP: installed from GitHub Releases"
            done
          done

      - name: Build .deb
        run: |
          source config.sh
          WORKDIR=/tmp CACHE_DIR="$GITHUB_WORKSPACE/cache" \
            bash debpkgs/${{ inputs.pkg }}/build.sh

      - name: Verify build output
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE/cache/${{ inputs.pkg }}_"*"_arm64.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.pkg }}-deb
          path: ${{ github.workspace }}/cache/${{ inputs.pkg }}_*_arm64.deb
          if-no-files-found: error

      - name: Extract changelog entry
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: changelog
        run: |
          PKG="${{ inputs.pkg }}"
          if [ -f "debpkgs/${PKG}/debian/changelog" ]; then
            BODY=$(dpkg-parsechangelog --show-field Changes \
              --file "debpkgs/${PKG}/debian/changelog")
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "body<<${EOF}" >> $GITHUB_OUTPUT
            echo "${BODY}" >> $GITHUB_OUTPUT
            echo "${EOF}" >> $GITHUB_OUTPUT
          fi

      - name: Publish to GitHub Releases
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debpkg/${{ inputs.pkg }}/${{ steps.version.outputs.version }}
          name: "${{ inputs.pkg }} ${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.body }}
          # The .built-sha sidecar records which upstream commit this release was
          # built from, so check-upstream-staleness.sh can compare it against the
          # current branch tip. Only git-backed packages produce one (via
          # record_upstream_sha); fail_on_unmatched_files=false skips the rest.
          files: |
            ${{ github.workspace }}/cache/${{ inputs.pkg }}_*_arm64.deb
            ${{ github.workspace }}/cache/${{ inputs.pkg }}.built-sha
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger apt repo publish
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Dispatch publish-apt-repo via the Actions REST API (gh CLI not
          # installed on this runner image).
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/publish-apt-repo.yml/dispatches" \
            -d '{"ref":"main"}'