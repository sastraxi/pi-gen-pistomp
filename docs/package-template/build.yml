# Per-package workflow template.
#
# Copy this to .github/workflows/build-<pkg>.yml and change <pkg> to the
# package name (matching the debpkgs/<pkg>/ directory). That's it — the
# build logic lives in .github/workflows/build-deb.yml (reusable workflow).
#
# The only per-package variation is the path filter (so only the changed
# package rebuilds). Build dependencies are parsed automatically from
# debian/control at runtime.

name: build-<pkg>

on:
  push:
    branches: [main]
    paths:
      - 'debpkgs/<pkg>/**'
  pull_request:
    paths:
      - 'debpkgs/<pkg>/**'
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-deb.yml
    with:
      pkg: <pkg>
    secrets: inherit